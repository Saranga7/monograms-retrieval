defaults:
  - model: dino
  - data: default
  - train: default
  - loss: clip
  - _self_

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  job:
    chdir: true

device: cuda
seed: 7
mode: train
visualize_after_train: true
wandb:
  use_wandb_logging: true
  project_name: cross_modal_retrieval_v2
  name: ${model.name}_AFClipLoss_fold${data.fold}