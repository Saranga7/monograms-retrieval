defaults:
  - model: dino
  - data: default
  - train: default
  - loss: clip
  - test: default
  - _self_

hydra:
  run:
    dir: outputs/training/${now:%Y-%m-%d}/${now:%H-%M-%S}
  job:
    chdir: true

device: cuda
seed: 7
mode: train
visualize_after_train: true
wandb:
  use_wandb_logging: true
  project_name: cross_modal_retrieval_v2
  name: ${model.name}_${loss.name}_stndrdSchemas_fold${data.fold}
  group: backbone_ablation
  job_type: train
  tags: [dinov3, linear, clip, grayscale, default_aug, fold0]


